  .lane-track { position: relative; flex: 1; }
  .sub-lane {
    position: relative; height: 24px;
    border-bottom: 1px solid rgba(48, 54, 61, 0.2);
  }
  .sub-lane:last-child { border-bottom: none; }
  .sub-lane:nth-child(even) { background: rgba(22, 27, 34, 0.35); }
  .sub-lane.row-highlight { background: rgba(139, 148, 158, 0.10); }
  .thread-lbl {
    position: absolute; left: 4px; top: 50%; transform: translateY(-50%);
    font-size: 9px; color: #484f58;
    font-family: 'SFMono-Regular', Consolas, monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 14%; pointer-events: none; z-index: 1; line-height: 1;
  }
  .conn-line {
    position: absolute; height: 1.5px; background: rgba(139, 148, 158, 0.25);
    top: 50%; transform: translateY(-50%); z-index: 1; pointer-events: none;
  }
  .evt-dot {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    transform: translate(-50%, -50%); top: 50%;
    border: 1.5px solid #0d1117; cursor: pointer; z-index: 3;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .evt-dot:hover {
    transform: translate(-50%, -50%) scale(1.7);
    box-shadow: 0 0 6px 2px currentColor; z-index: 4;
  }
  .evt-dot.nudged::before {
    content: '';
    position: absolute;
    top: 50%;
    right: 100%;
    width: 5px;
    height: 1.5px;
    background: currentColor;
    opacity: 0.45;
    transform: translateY(-50%);
    pointer-events: none;
  }
  .timeline.highlight-tag .evt-dot {
    opacity: 0.15; transition: opacity 0.15s ease, transform 0.1s ease, box-shadow 0.1s ease;
  }
  .timeline.highlight-tag .evt-dot.evt-highlighted {
    opacity: 1; transform: translate(-50%, -50%) scale(1.5);
    box-shadow: 0 0 6px 2px currentColor; z-index: 4;
  }
  .gridline {
    position: absolute; top: 0; bottom: 0; width: 1px;

const PAD_L = 16;
const PAD_R = 14;
const T_MIN = 0;
const T_MAX = 150;
const T_SPAN = T_MAX - T_MIN;
const TICK_INTERVAL = 25;
const MIN_GAP = 1.4;

function pct(t) { return PAD_L + ((t - T_MIN) / T_SPAN) * (100 - PAD_L - PAD_R); }

function displayPositions(events) {
  const natural = events.map(e => pct(e.time));
  const pos = [...natural];
  for (let i = 1; i < pos.length; i++) {
    if (pos[i] - pos[i - 1] < MIN_GAP) pos[i] = pos[i - 1] + MIN_GAP;
  }
  return { pos, nudged: pos.map((p, i) => Math.abs(p - natural[i]) > 0.01) };
}

function buildLegend() {
  const el = document.getElementById('legend');
  const timeline = document.getElementById('timeline');
  for (const [tag, color] of Object.entries(TAG_COLORS)) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = color;
    item.appendChild(dot);
    item.appendChild(document.createTextNode(tag));
    item.addEventListener('mouseenter', () => {
      timeline.classList.add('highlight-tag');
      timeline.querySelectorAll('.evt-dot[data-tag="' + tag + '"]').forEach(d => {
        d.classList.add('evt-highlighted');
      });
    });
    item.addEventListener('mouseleave', () => {
      timeline.classList.remove('highlight-tag');
      timeline.querySelectorAll('.evt-dot.evt-highlighted').forEach(d => {
        d.classList.remove('evt-highlighted');
      });
    });
    el.appendChild(item);
  }
  const nudgeHint = document.createElement('div');
  nudgeHint.className = 'legend-nudge';
  const nudgeIcon = document.createElement('div');
  nudgeIcon.className = 'legend-nudge-icon';
  nudgeHint.appendChild(nudgeIcon);
  nudgeHint.appendChild(document.createTextNode('position adjusted for spacing'));
  el.appendChild(nudgeHint);
  const modHint = document.createElement('div');
  modHint.className = 'legend-nudge';
  modHint.appendChild(document.createTextNode('hold ⌘/Alt + hover dot to highlight type'));
  el.appendChild(modHint);
}

function buildTimeline() {
  const container = document.getElementById('timeline');
  const tooltip = document.getElementById('tooltip');
  const ticks = [];
  for (let t = T_MIN; t <= T_MAX; t += TICK_INTERVAL) ticks.push(t);
  const tagCounters = {};

  NODES.forEach((node, ni) => {
    const lane = document.createElement('div');
    lane.className = 'lane';

    const label = document.createElement('div');
    label.className = 'lane-label';
    const badge = document.createElement('span');
    badge.className = 'node-badge';
    badge.style.background = node.badgeColor;
    badge.style.color = node.textColor;
    badge.textContent = node.id;
    label.appendChild(badge);
    lane.appendChild(label);

    const track = document.createElement('div');
    track.className = 'lane-track';

    const nodeTrees = TREES.filter(t => t.node === node.id);

    ticks.forEach(t => {
      const gl = document.createElement('div');
      gl.className = 'gridline';
      gl.style.left = pct(t) + '%';
      track.appendChild(gl);
    });

    nodeTrees.forEach(tree => {
      const sl = document.createElement('div');
      sl.className = 'sub-lane';

      const lbl = document.createElement('div');
      lbl.className = 'thread-lbl';
      lbl.textContent = tree.thread;
      sl.appendChild(lbl);

      const { pos, nudged } = displayPositions(tree.events);

      if (pos.length > 1) {
        const line = document.createElement('div');
        line.className = 'conn-line';
        line.style.left = pos[0] + '%';
        line.style.width = (pos[pos.length - 1] - pos[0]) + '%';
        sl.appendChild(line);
      }

      tree.events.forEach((evt, ei) => {
        const dot = document.createElement('div');
        dot.className = 'evt-dot';
        if (nudged[ei]) dot.classList.add('nudged');
        dot.dataset.tag = evt.tag;
        tagCounters[evt.tag] = (tagCounters[evt.tag] || 0) + 1;
        dot.dataset.tagIdx = tagCounters[evt.tag];
        const color = TAG_COLORS[evt.tag] || '#6e7681';
        dot.style.background = color;
        dot.style.color = color;
        dot.style.left = pos[ei] + '%';
        attachTooltip(dot, evt, tree, tooltip, nudged[ei]);
        sl.appendChild(dot);
      });

      track.appendChild(sl);
    });

    lane.appendChild(track);
    container.appendChild(lane);
  });

  const axis = document.createElement('div');
  axis.className = 'time-axis';
  const axLbl = document.createElement('div');
  axLbl.className = 'lane-label';
  axLbl.innerHTML = '<span style="font-size:10px;color:#6e7681">time (ms)</span>';
  axis.appendChild(axLbl);
  const axTrack = document.createElement('div');
  axTrack.className = 'time-axis-track';
  ticks.forEach(t => {
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.left = pct(t) + '%';
    tick.textContent = t;
    axTrack.appendChild(tick);
  });
  axis.appendChild(axTrack);
  container.appendChild(axis);
  tagTotals = tagCounters;
}

let hoveredTag = null;
let hoveredDot = null;
let tagTotals = {};
const timeline = document.getElementById('timeline');

function activateTagHighlight(tag) {
  timeline.classList.add('highlight-tag');
  timeline.querySelectorAll('.evt-dot[data-tag="' + tag + '"]').forEach(d => {
    d.classList.add('evt-highlighted');
  });
  if (hoveredDot) appendTagCount(hoveredDot, tag);
}

function clearTagHighlight() {
  timeline.classList.remove('highlight-tag');
  timeline.querySelectorAll('.evt-dot.evt-highlighted').forEach(d => {
    d.classList.remove('evt-highlighted');
  });
  const countEl = document.getElementById('tooltip').querySelector('.tt-count');
  if (countEl) countEl.remove();
}

function appendTagCount(dot, tag) {
  const tooltip = document.getElementById('tooltip');
  if (tooltip.querySelector('.tt-count')) return;
  const idx = dot.dataset.tagIdx;
  const total = tagTotals[tag] || '?';
  const el = document.createElement('div');
  el.className = 'tt-count';
  el.style.cssText = 'margin-top:4px;padding-top:4px;border-top:1px solid #30363d;color:#8b949e;font-size:11px;font-family:SFMono-Regular,Consolas,monospace';
  el.textContent = idx + ' of ' + total + ' [' + tag + ']';
  tooltip.appendChild(el);
}

document.addEventListener('keydown', e => {
  if ((e.altKey || e.metaKey) && hoveredTag && !timeline.classList.contains('highlight-tag')) {
    activateTagHighlight(hoveredTag);
  }
});
document.addEventListener('keyup', () => {
  if (timeline.classList.contains('highlight-tag')) clearTagHighlight();
});

function attachTooltip(el, evt, tree, tooltip, isNudged) {
  el.addEventListener('mouseenter', e => {
    hoveredTag = evt.tag;
    hoveredDot = el;
    const lane = el.closest('.sub-lane');
    if (lane) lane.classList.add('row-highlight');
    const color = TAG_COLORS[evt.tag] || '#6e7681';
    let html = '<div class="tt-tag" style="color:' + color + '">[' + evt.tag + ']</div>';
    html += '<div class="tt-detail">';
    html += '@' + evt.time + 'ms';
    html += '<br>thread: ' + tree.thread;
    if (evt.exchangeId) html += '<br>exchangeId: ' + evt.exchangeId;
    if (evt.detail) html += '<br>' + evt.detail;
    if (isNudged) html += '<br><span style="color:#e3b341">⬥ position adjusted for spacing</span>';
    html += '</div>';
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    posTooltip(e);
    if (e.altKey || e.metaKey) activateTagHighlight(evt.tag);
  });
  el.addEventListener('mousemove', posTooltip);
  el.addEventListener('mouseleave', () => {
    hoveredTag = null;
    hoveredDot = null;
    tooltip.style.display = 'none';
    const lane = el.closest('.sub-lane');
    if (lane) lane.classList.remove('row-highlight');
    clearTagHighlight();
  });

  function posTooltip(e) {
    let x = e.clientX + 14, y = e.clientY + 14;
    const r = tooltip.getBoundingClientRect();
    if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - 14;
    if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - 14;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
}

buildLegend();
buildTimeline();
</script>
